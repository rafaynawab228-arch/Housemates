<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Housemates Pro</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2196f3">

  <style>
    body { font-family: Arial; padding: 15px; }
    button { padding: 8px; margin: 5px; }
    input { padding: 8px; margin: 5px; }
    li { margin: 8px 0; }
    .card { border: 1px solid #ddd; padding: 10px; margin-top: 10px; }
    .overdue { color: red; font-weight: bold; }
  </style>
</head>

<body>

<h2>🏠 Housemates Pro</h2>

<div id="login">
  <button id="googleLogin">Login with Google</button>
  <button id="guestLogin">Continue as Guest</button>
</div>

<div id="app" style="display:none;">
  <p>👤 <span id="userName"></span></p>
  <button id="logout">🚪 Sign Out</button>

  <div class="card">
    <h3>House</h3>
    <button id="createHouse">Create</button>
    <input id="joinCode" placeholder="Enter House ID">
    <button id="joinHouse">Join</button>
    <p id="houseLabel"></p>
  </div>

  <div class="card">
    <h3>Tasks</h3>
    <input id="taskInput" placeholder="Task">
    <input type="date" id="dueDate">
    <button id="addTask">Add</button>
    <ul id="tasks"></ul>
  </div>

  <div class="card">
    <h3>History</h3>
    <ul id="history"></ul>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup,
  signInAnonymously, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore, doc, setDoc, collection, addDoc,
  onSnapshot, updateDoc, getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔑 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyC6cEPxWUMo5aOnwIbdfUJgJrHNMWuUpiY",
  authDomain: "housemates-c2f64.firebaseapp.com",
  projectId: "housemates-c2f64",
  storageBucket: "housemates-c2f64.firebasestorage.app",
  messagingSenderId: "1058355549457",
  appId: "1:1058355549457:web:437087d69a18494877a8b0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let houseId = null;
let members = [];

// UI refs
const loginDiv = document.getElementById("login");
const appDiv = document.getElementById("app");
const taskList = document.getElementById("tasks");
const historyList = document.getElementById("history");

// AUTH
onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    document.getElementById("userName").textContent =
      user.displayName || "Guest";
    loginDiv.style.display = "none";
    appDiv.style.display = "block";
  } else {
    loginDiv.style.display = "block";
    appDiv.style.display = "none";
  }
});

// LOGIN
googleLogin.onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
guestLogin.onclick = () => signInAnonymously(auth);

// LOGOUT
logout.onclick = () => {
  signOut(auth);
  houseId = null;
  taskList.innerHTML = "";
  historyList.innerHTML = "";
};

// CREATE HOUSE
createHouse.onclick = async () => {
  houseId = crypto.randomUUID();

  await setDoc(doc(db, "houses", houseId), { createdAt: Date.now() });

  await setDoc(doc(db, "houses", houseId, "members", currentUser.uid), {
    name: currentUser.displayName || "Guest"
  });

  alert("House ID:\n" + houseId);
  houseLabel.textContent = houseId;

  loadMembers();
  loadTasks();
  loadHistory();
};

// JOIN HOUSE
joinHouse.onclick = async () => {
  houseId = joinCode.value;
  if (!houseId) return alert("Enter ID");

  await setDoc(doc(db, "houses", houseId, "members", currentUser.uid), {
    name: currentUser.displayName || "Guest"
  });

  houseLabel.textContent = houseId;

  loadMembers();
  loadTasks();
  loadHistory();
};

// LOAD MEMBERS
async function loadMembers() {
  const snap = await getDocs(collection(db, "houses", houseId, "members"));
  members = [];
  snap.forEach(doc => members.push({ id: doc.id, ...doc.data() }));
}

// ADD TASK
addTask.onclick = async () => {
  const text = taskInput.value;
  const due = dueDate.value;

  if (!text) return;

  if (members.length === 0) await loadMembers();

  await addDoc(collection(db, "houses", houseId, "tasks"), {
    text,
    dueDate: due,
    assignedIndex: 0,
    assignedTo: members[0]?.id || currentUser.uid
  });

  taskInput.value = "";
};

// LOAD TASKS
function loadTasks() {
  onSnapshot(collection(db, "houses", houseId, "tasks"), (snap) => {
    taskList.innerHTML = "";

    snap.forEach((docSnap) => {
      const t = docSnap.data();
      const assigned = members.find(m => m.id === t.assignedTo);

      const li = document.createElement("li");

      let overdue = "";
      if (t.dueDate && new Date(t.dueDate) < new Date()) {
        overdue = " (OVERDUE)";
        li.classList.add("overdue");
      }

      li.textContent =
        `${t.text} → ${assigned?.name || "?"} (Due: ${t.dueDate || "None"})${overdue}`;

      const btn = document.createElement("button");
      btn.textContent = "Complete";

      btn.onclick = async () => {
        let next = (t.assignedIndex + 1) % members.length;

        // SAVE HISTORY
        await addDoc(collection(db, "houses", houseId, "history"), {
          task: t.text,
          completedBy: currentUser.displayName || "Guest",
          time: new Date().toLocaleString()
        });

        await updateDoc(doc(db, "houses", houseId, "tasks", docSnap.id), {
          assignedIndex: next,
          assignedTo: members[next].id
        });
      };

      li.appendChild(btn);
      taskList.appendChild(li);
    });
  });
}

// LOAD HISTORY
function loadHistory() {
  onSnapshot(collection(db, "houses", houseId, "history"), (snap) => {
    historyList.innerHTML = "";

    snap.forEach((docSnap) => {
      const h = docSnap.data();
      const li = document.createElement("li");
      li.textContent = `${h.task} ✔ by ${h.completedBy} at ${h.time}`;
      historyList.appendChild(li);
    });
  });
}

// PWA SERVICE WORKER
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
